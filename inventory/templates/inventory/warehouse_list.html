{% load static %}

<table class="table table-striped">
    {% if warehouse_list %}
        <thead>
            <tr class="dark">
                <td scope="col">Nombre</td>
                <td scope="col">Domicilio</td>
                <td scope="col" class="text-center" style="width: 10%;">Acciones</td>
            </tr>
        </thead>
        <tbody>
            {% for warehouse in warehouse_list %}
            <tr>
                <td>{{ warehouse.name }}</td>
                <td>{{ warehouse.address }}</td>
                <td class="text-center">
                    <a href="#" hx-get="{% url 'warehouse_update' warehouse.pk %}"
                    hx-target="#dialog" class="text-decoration-none me-1 pencil"
                    data-bs-toggle="tooltip" data-bs-title="Modificar">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="#" hx-get="{% url 'warehouse_delete' warehouse.pk %}"
                    hx-target="#dialog" class="text-decoration-none text-danger me-1 delete"
                    data-bs-toggle="tooltip" data-bs-title="Eliminar">
                        <i class="bi bi-trash3"></i>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    {% else %}
        <p class="m-2">
            <i class="bi bi-exclamation-circle me-2"></i>
            Todavía no se creó un depósito. Podés empezar haciendo click <a href="#" class="text-decoration-none" hx-get="{% url 'warehouse_create' %}" hx-target="#dialog">acá</a>.
        </p>
    {% endif %}
</table>

<script src="{% static 'main/js/tooltips.js' %}"></script>
