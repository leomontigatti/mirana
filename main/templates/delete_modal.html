{% load extra_tags %}

<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="fw-bold modal-title fs-5" id="deleteModalLabel">Borrar {{ model|to_spanish }}</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center">
                Estás seguro de borrar el comprobante?<br>Esta operación <strong>NO</strong> puede deshacerse.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary m-2" data-bs-dismiss="modal">Cancelar</button>
                <form action="{% url model|add:'_delete' form.instance.id %}" method="POST">
                    {% csrf_token %}
                    <button class="btn btn-outline-danger m-2">
                        <i class="bi bi-trash3 me-2"></i>Confirmar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
