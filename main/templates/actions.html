<a href="{% url model|add:'_detail' object.pk %}" class="text-decoration-none me-1 eye"
data-bs-toggle="tooltip" data-bs-title="Ver detalle">
    <i class="bi bi-eye"></i>
</a>
{% if model == "invoice" or model == "stock" %}
    <i class="bi bi-pencil text-muted me-1"></i>
{% else %}
    <a href="{% url model|add:'_update' object.pk %}" class="text-decoration-none me-1 pencil"
    data-bs-toggle="tooltip" data-bs-title="Modificar">
        <i class="bi bi-pencil"></i>
    </a>
{% endif %}
